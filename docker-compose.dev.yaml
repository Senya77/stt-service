services:
    stt-batch:
        build:
            context: .
            dockerfile: Dockerfile.dev
        image: stt-gigaam-ctc-stt-service:latest
        container_name: stt-gigaam-ctc-batch-dev
        restart: unless-stopped
        command: ["uv", "run", "--no-sync", "python", "-m", "src.gigaam_ctc.main_batch"]
        env_file:
            - .env
        ports:
            - "${GRPC_BATCH_PORT:-50051}:50051"
        volumes:
            - ./src:/home/noname/src
            - .env:/home/noname/.env:ro
            - ./pyproject.toml:/home/noname/pyproject.toml:ro
            - ~/.cache/huggingface:/home/noname/cache/gigaam
            - ~/.clearml/cache:/home/noname/cache/clearml

    stt-stream:
        build:
            context: .
            dockerfile: Dockerfile.dev
        image: stt-gigaam-ctc-stt-service:latest
        container_name: stt-gigaam-ctc-stream-dev
        restart: unless-stopped
        command: ["uv", "run", "--no-sync", "python", "-m", "src.gigaam_ctc.main_stream"]
        env_file:
            - .env
        environment:
            GRPC_SERVER_PORT: "50051"
        ports:
            - "${GRPC_STREAM_PORT:-50052}:50051"
        volumes:
            - ./src:/home/noname/src
            - .env:/home/noname/.env:ro
            - ./pyproject.toml:/home/noname/pyproject.toml:ro
            - ~/.cache/huggingface:/home/noname/cache/gigaam
            - ~/.clearml/cache:/home/noname/cache/clearml

    stt-openai:
        build:
            context: .
            dockerfile: Dockerfile.dev
        image: stt-gigaam-ctc-stt-service:latest
        container_name: stt-gigaam-ctc-http-dev
        restart: unless-stopped
        command: ["uv", "run", "--no-sync", "python", "-m", "src.gigaam_ctc.main_http"]
        env_file:
            - .env
        environment:
            HTTP_SERVER_PORT: "8080"
        ports:
            - "${HTTP_OPENAI_PORT:-8080}:8080"
        volumes:
            - ./src:/home/noname/src
            - .env:/home/noname/.env:ro
            - ./pyproject.toml:/home/noname/pyproject.toml:ro
            - ~/.cache/huggingface:/home/noname/cache/gigaam
            - ~/.clearml/cache:/home/noname/cache/clearml
